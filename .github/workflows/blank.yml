name: Build Paper 1.20.4 Server with Slimefun4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install 7zip (for splitting)
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create server directory
        run: mkdir server

      # 1. DOWNLOAD PAPER 1.20.4 (from your Gist)
      - name: Download Paper 1.20.4
        working-directory: ./server
        run: |
          PAPER_URL="https://fill-data.papermc.io/v1/objects/cabed3ae77cf55deba7c7d8722bc9cfd5e991201c211665f9265616d9fe5c77b/paper-1.20.4-499.jar"
          wget "$PAPER_URL" -O server.jar

      # 2. DOWNLOAD SLIMEFUN4 (correct blob.build link)
      - name: Download Slimefun4
        working-directory: ./server
        run: |
          mkdir -p plugins
          # Development build from blob.build (Recommended for 1.20.4)
          wget "https://blob.build/project/Slimefun4/Dev" -O plugins/Slimefun4.jar

      # 3. FIRST RUN (Accept EULA)
      - name: First run - Accept EULA and generate files
        working-directory: ./server
        run: |
          echo "eula=true" > eula.txt
          java -jar server.jar nogui || true

      # 4. SECOND RUN (Initialize Slimefun4)
      - name: Second run - Initialize Slimefun4
        working-directory: ./server
        run: |
          # Run for 45 seconds to let Slimefun fully load its database
          timeout 45s java -jar server.jar nogui || true
          sleep 5

      # 5. ZIP and SPLIT into 100MB parts
      - name: Compress and split server
        working-directory: ./server
        run: |
          zip -r ../paper-slimefun-server.zip .
          cd ..
          7z -v100m a paper-slimefun-server.7z ./paper-slimefun-server.zip
          rm paper-slimefun-server.zip

      - name: Upload split archive
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Server-Parts
          path: paper-slimefun-server.7z.*
          retention-days: 7
